<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Bouquet</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0305;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  .scene {
    position: relative;
    width: 700px;
    height: 700px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Ambient glow behind bouquet */
  .glow {
    position: absolute;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,20,40,0.18) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-glow {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* Falling petals */
  .petal-particle {
    position: absolute;
    width: 8px;
    height: 10px;
    background: radial-gradient(ellipse at 40% 30%, #ff6b8a, #8b0020);
    border-radius: 50% 0 50% 0;
    opacity: 0;
    pointer-events: none;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { opacity: 0; transform: translateY(-60px) rotate(0deg); }
    10% { opacity: 0.7; }
    90% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(680px) rotate(720deg); }
  }

  /* SVG bouquet container */
  .bouquet-svg {
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 20px 60px rgba(140, 0, 30, 0.5));
  }

  /* Animation states for bouquet forming */
  .stem { stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw-stem 1s ease forwards; }
  .leaf { opacity: 0; animation: appear 0.5s ease forwards; }
  .ribbon { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw-ribbon 0.8s ease forwards; }

  @keyframes draw-stem { to { stroke-dashoffset: 0; } }
  @keyframes appear { to { opacity: 1; } }
  @keyframes draw-ribbon { to { stroke-dashoffset: 0; } }

  /* Individual rose bloom animations */
  .rose-group { transform-origin: center; opacity: 0; }
  .rose-group.bloom {
    animation: bloom-in 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes bloom-in {
    0% { opacity: 0; transform: scale(0) rotate(-20deg); }
    60% { opacity: 1; transform: scale(1.08) rotate(3deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* Breathing sway for the whole bouquet */
  .bouquet-inner {
    animation: sway 6s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-0.8deg); }
    50% { transform: rotate(0.8deg); }
  }

  /* Sparkle dots */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #ffccd5;
    opacity: 0;
    animation: sparkle-anim ease-in-out infinite;
  }
  @keyframes sparkle-anim {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Dedication text at top */
  .dedication {
    text-align: center;
    margin-bottom: -18px;
    opacity: 0;
    animation: fade-down 1.8s ease 0.3s forwards;
    z-index: 10;
    position: relative;
  }
  .dedication-line1 {
    color: rgba(255, 180, 195, 0.7);
    font-size: 1.05rem;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }
  .dedication-name {
    color: rgba(255, 210, 220, 0.95);
    font-size: 2.6rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.12em;
    display: block;
    text-shadow: 0 0 40px rgba(200, 20, 50, 0.6), 0 0 80px rgba(180, 10, 35, 0.3);
  }
  .dedication-divider {
    display: block;
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,80,100,0.6), transparent);
    margin: 10px auto 0;
  }
  @keyframes fade-down {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Title text */
  .title {
    color: rgba(255, 200, 210, 0.85);
    font-size: 1.5rem;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.18em;
    text-align: center;
    margin-top: -30px;
    opacity: 0;
    animation: fade-up 1.5s ease 3.5s forwards;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<!-- Falling petal particles -->
<script>
  for (let i = 0; i < 22; i++) {

    p.style.top = '-20px';

    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.transform = `rotate(${Math.random()*360}deg) scale(${0.5 + Math.random()})`;
    document.body.appendChild(p);
  }
</script>
